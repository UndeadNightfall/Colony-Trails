<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colony Trails Rain Preview</title>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #10212b; }
    body { display: flex; align-items: center; justify-content: center; }
    canvas { width: min(100vw, 1600px); height: min(100vh, 1000px); display: block; background: #5d7f35; }
    .label {
      position: fixed;
      left: 18px;
      top: 16px;
      z-index: 2;
      color: #f4e7c9;
      font: 800 14px system-ui, sans-serif;
      padding: 8px 12px;
      border-radius: 14px;
      background: rgba(24, 18, 12, 0.72);
      border: 1px solid rgba(136, 104, 72, 0.45);
    }
  </style>
</head>
<body>
  <div class="label">Rain Preview</div>
  <canvas id="c" width="1600" height="1000"></canvas>
  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");

    const state = {
      time: 0,
      rain: true,
      rainPhase: 0,
      stormDuration: 26,
      ants: [
        { x: 340, y: 540, targetX: 950, targetY: 460, speed: 68, color: "#2c140b", carrying: false, alive: true },
        { x: 420, y: 610, targetX: 930, targetY: 500, speed: 62, color: "#4a2114", carrying: false, alive: true },
        { x: 290, y: 665, targetX: 860, targetY: 525, speed: 58, color: "#7b4b2f", carrying: false, alive: true }
      ]
    };

    function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
    function lerp(a, b, t) { return a + (b - a) * t; }

    function drawNest() {
      ctx.fillStyle = "#5d3622";
      ctx.beginPath();
      ctx.arc(260, 510, 150, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(255, 224, 158, 0.28)";
      ctx.lineWidth = 10;
      ctx.stroke();
      ctx.fillStyle = "#a96335";
      ctx.beginPath();
      ctx.arc(260, 510, 48, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#e2a05c";
      ctx.beginPath();
      ctx.arc(202, 510, 28, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(392, 510, 22, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawGround() {
      const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      grad.addColorStop(0, "#658740");
      grad.addColorStop(1, "#45612a");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "rgba(82, 54, 31, 0.18)";
      for (let y = 70; y < canvas.height; y += 80) {
        for (let x = 0; x < canvas.width; x += 96) {
          ctx.beginPath();
          ctx.ellipse(x + 20, y + 24, 32, 15, 0.26, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function drawAnt(ant, t) {
      if (!ant.alive) return;
      const dx = ant.targetX - ant.x;
      const dy = ant.targetY - ant.y;
      const angle = Math.atan2(dy, dx);
      ctx.save();
      ctx.translate(ant.x, ant.y);
      ctx.rotate(angle + Math.PI);
      const walk = t * 0.008 + ant.x * 0.02;
      ctx.strokeStyle = ant.color;
      ctx.lineWidth = 2;
      for (let i = -1; i <= 1; i++) {
        const px = i * 10;
        const swing = Math.sin(walk + i * 1.7) * 10;
        ctx.beginPath();
        ctx.moveTo(px, -4);
        ctx.lineTo(px - 24 + swing, -24);
        ctx.moveTo(px, 4);
        ctx.lineTo(px - 24 - swing, 24);
        ctx.stroke();
      }
      ctx.fillStyle = ant.color;
      ctx.beginPath(); ctx.ellipse(-16, 0, 10, 9, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(0, 0, 11, 10, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(16, 0, 13, 11, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#fff1c4";
      ctx.beginPath(); ctx.arc(-22, -3, 1.8, 0, Math.PI * 2); ctx.arc(-22, 3, 1.8, 0, Math.PI * 2); ctx.fill();
      if (ant.carrying) {
        ctx.fillStyle = "#e4b55e";
        ctx.beginPath();
        ctx.ellipse(-32, 0, 8, 6, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function updateAnts(dt) {
      for (const ant of state.ants) {
        const dx = ant.targetX - ant.x;
        const dy = ant.targetY - ant.y;
        const dist = Math.hypot(dx, dy);
        if (dist > 1) {
          const speed = weatherPushSpeed(ant);
          ant.x += dx / dist * speed * dt;
          ant.y += dy / dist * speed * dt;
        }
        if (state.rain && Math.random() < 0.0018 * dt * 60) {
          ant.carrying = false;
        }
        ant.x = clamp(ant.x, 20, 1580);
        ant.y = clamp(ant.y, 20, 980);
      }
    }

    function weatherPushSpeed(ant) {
      if (!state.rain) return ant.speed;
      const towardNest = Math.hypot(ant.x - 260, ant.y - 510);
      return lerp(ant.speed * 0.8, ant.speed * 1.18, clamp(towardNest / 800, 0, 1));
    }

    function drawRain(t) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(0, 0, canvas.width, canvas.height);
      ctx.arc(260, 510, 170, 0, Math.PI * 2, true);
      ctx.clip("evenodd");
      ctx.globalAlpha = 0.35;
      ctx.strokeStyle = "#b8d6e8";
      ctx.lineWidth = 2;
      for (let i = 0; i < 180; i++) {
        const x = (i * 71 + t * 0.56) % (canvas.width + 120) - 60;
        const y = (i * 37 + t * 1.2) % (canvas.height + 120) - 60;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x - 10, y + 26);
        ctx.stroke();
      }
      ctx.fillStyle = "rgba(55, 84, 110, 0.12)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
    }

    function drawPuddles(t) {
      ctx.save();
      ctx.fillStyle = "rgba(142, 188, 214, 0.18)";
      for (let i = 0; i < 6; i++) {
        const x = 420 + i * 190 + Math.sin(t * 0.002 + i) * 18;
        const y = 770 + Math.cos(t * 0.0015 + i) * 12;
        ctx.beginPath();
        ctx.ellipse(x, y, 52, 18, Math.sin(i) * 0.4, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function loop(now) {
      const dt = Math.min(0.032, (now - state.time) / 1000 || 0.016);
      state.time = now;
      state.rainPhase += dt;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGround();
      drawPuddles(now);
      updateAnts(dt);
      for (const ant of state.ants) drawAnt(ant, now);
      drawRain(now);
      drawNest();
      ctx.fillStyle = "rgba(20, 15, 10, 0.18)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
